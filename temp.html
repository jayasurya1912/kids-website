<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ece7e1;
    font-family:'Poppins',sans-serif;
}

/* Section */
.contact-section{
    padding:80px 0;
    position:relative;
    overflow:hidden;
}

/* Heading */
.contact-title{
    font-size:40px;
    font-weight:700;
    color:#0f5aa5;
}

.contact-text{
    margin-top:20px;
    line-height:1.6;
}

/* Deer image */
.contact-deer{
    max-width:260px;
    margin-top:40px;
}

/* Form Card */
.contact-card{
    background:#d8bda9;
    border-radius:25px;
    padding:35px;
    position:relative;
}

/* Bird decoration */
.contact-bird{
    position:absolute;
    top:-25px;
    right:-10px;
    width:70px;
}

/* Form controls */
.contact-card .form-control,
.contact-card .form-select{
    border-radius:10px;
    padding:12px;
    margin-bottom:15px;
}

/* Buttons */
.btn-send{
    background:#f07f4f;
    color:white;
    border-radius:8px;
    padding:6px 14px;
    margin-right:8px;
}
.btn-verify{
    background:#bcbcbc;
    color:white;
    border-radius:8px;
    padding:6px 14px;
}

.btn-submit{
    background:#8e8e8e;
    color:white;
    border-radius:10px;
    padding:10px 25px;
}

/* Responsive */
@media(max-width:992px){
    .contact-section{text-align:center;}
    .contact-deer{ margin:30px auto; }
}

@media(max-width:576px){
    .contact-title{ font-size:30px; }
}
</style>
</head>

<body>

<section class="contact-section" style="background:#ece7e1;">
<div class="container">
    <div class="row align-items-center">

        <!-- LEFT SIDE -->
        <div class="col-lg-5">
            <h2 class="contact-title">Contact Us</h2>

            <p class="contact-text">
                <strong>Little Millennium Education Pvt. Ltd. (LMEPL)</strong><br>
                502–506, M3M Cosmopolitan,<br>
                Golf Course Extn Road,<br>
                Sector – 66, Gurgaon – 122002<br>
                0124 – 4536350
            </p>

            <img src="images/bunny.png" class="contact-deer">
        </div>

        <!-- RIGHT FORM -->
        <div class="col-lg-7">
            <div class="contact-card">
                <img src="images/crow.png" class="contact-bird">

                <p class="mb-3">
                    Fill In The Form Below To Get In Touch With Us At Kudoos kids – One Of The Best Preschool For Children In Hosur
                </p>

                <div class="row">
                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="First Name*">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Last Name*">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <input type="email" class="form-control" placeholder="Email*">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Mobile*">

                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <select class="form-select">
                            <option>Select State*</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <select class="form-select">
                            <option>Select City*</option>
                        </select>
                    </div>
                </div>

                <textarea class="form-control" rows="4" placeholder="Write your comment"></textarea>

                <button class="btn btn-submit mt-3">Submit</button>
            </div>
        </div>

    </div>
</div>
</section>

</body>
</html>
